on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: codeberg-tiny-lazy
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
      - name: Install dependencies
        run: dart pub get
      - name: Activate Jaspr CLI
        run: dart pub global activate jaspr_cli
      - name: Build
        run: |
          jaspr build --verbose
      - name: deploy
        run: |
          echo ${{ secrets.SFTP_HOST_KEYS }} >> $HOME/.ssh/known_hosts
          lftp -c "open ${{ secrets.SFTP_URL }} && mirror -Rev build/jaspr /"
